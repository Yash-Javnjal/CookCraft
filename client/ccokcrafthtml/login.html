<!-- Subtle atmospheric JS effect -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const bgImage = document.getElementById('bg-image');
            let targetX = 0;
            let targetY = 0;
            let currentX = 0;
            let currentY = 0;

            document.addEventListener('mousemove', (e) => {
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                // Calculate normalized mouse position (-1 to 1)
                const mouseX = (e.clientX / windowWidth) * 2 - 1;
                const mouseY = (e.clientY / windowHeight) * 2 - 1;
                
                // Set target displacement for background (heavy feel)
                targetX = mouseX * -25; 
                targetY = mouseY * -15;
                
                // Keep the card hover effect
                const card = document.querySelector('.glow-effect');
                if(card) {
                    const x = (e.clientX / windowWidth - 0.5) * 5;
                    const y = (e.clientY / windowHeight - 0.5) * 5;
                    card.style.transform = `perspective(1000px) rotateX(${-y}deg) rotateY(${x}deg) scale3d(1.01, 1.01, 1.01)`;
                }
            });

            function animate() {
                // Easing for the heavy background interaction
                currentX += (targetX - currentX) * 0.03;
                currentY += (targetY - currentY) * 0.03;
                
                // Simulate rotation based on X movement
                const rot = currentX * 0.15;

                if (bgImage) {
                    bgImage.style.setProperty('--bg-x', `${currentX}px`);
                    bgImage.style.setProperty('--bg-y', `${currentY}px`);
                    bgImage.style.setProperty('--bg-rot', `${rot}deg`);
                }
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            // Flour Particles Logic
            const title = document.getElementById('cookcraft-title');
            const particleContainer = document.getElementById('particle-container');
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            
            if (title && particleContainer) {
                title.addEventListener('click', () => {
                    if (prefersReducedMotion.matches) return;
                    
                    const particleCount = 40;
                    for (let i = 0; i < particleCount; i++) {
                        createFlourParticle();
                    }
                });
            }
            
            function createFlourParticle() {
                const p = document.createElement('div');
                p.classList.add('flour-particle');
                
                // Randomize properties for natural look
                const size = Math.random() * 5 + 2; // 2px to 7px
                const startX = Math.random() * 100; // 0vw to 100vw
                const duration = Math.random() * 3 + 2; // 2s to 5s
                const drift = (Math.random() - 0.5) * 150; // -75px to 75px
                const rot = (Math.random() - 0.5) * 360; // -180deg to 180deg
                const delay = Math.random() * 0.4;
                
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${startX}vw`;
                p.style.top = `-20px`;
                p.style.setProperty('--drift', `${drift}px`);
                p.style.setProperty('--rot', `${rot}deg`);
                p.style.animation = `flour-fall ${duration}s ease-in ${delay}s forwards`;
                
                particleContainer.appendChild(p);
                
                // Cleanup after animation completes
                setTimeout(() => {
                    if (p.parentNode) p.remove();
                }, (duration + delay) * 1000);
            }
        });
    </script>
